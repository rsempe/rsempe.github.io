<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script>
      var lang = (navigator.language || '').substring(0, 2);
      var supported = { en: '/en/', de: '/de/', nl: '/nl/', it: '/it/', es: '/es/', fr: '/fr/' };
      window.location.replace(supported[lang] || '/fr/');
    </script>
    <meta http-equiv="refresh" content="0;url=/fr/">
    <title>Gîtes Les Célestins</title>
</head>
<body>
    <p>Redirecting... <a href="/fr/">Cliquez ici</a> / <a href="/en/">Click here</a></p>
</body>
</html>
